syntax = "proto3";

package ml_service;

service ResumeAnalyzer {
    rpc EvaluateResume (ResumeRequest) returns (ResumeResponse);
}

message Competency {
    string name = 1;
    int32 required_level = 2;
}

message Profession {
    string name = 1;
    repeated Competency competencies = 2;
}

message ResumeRequest {
    string resume_text = 1;
    Profession target_profession = 2;
    repeated Profession all_professions = 3;
}

message ProfessionMatch {
    string name = 1;
    double match_percent = 2;
    map<string, int32> final_levels = 3;
    repeated MissingSkill missing_skills = 4;
}

message ResumeResponse {
    ProfessionMatch target_result = 1;
    repeated ProfessionMatch alternative_professions = 2;
    bool is_target_best = 3;
    string best_profession = 4;
}

message Evaluation {
    double match_percent = 1;
    repeated MissingSkill missing_skills = 2;
}

message MissingSkill {
    string name = 1;
    int32 required_level = 2;
    int32 candidate_level = 3;
}
